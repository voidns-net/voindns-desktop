<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- VoidNS app icon: the client's animated "core emblem" frozen into a static
       mark — concentric cyan orbits + three nodes around a glowing core, on the
       same deep-space radial the GUI card uses. Matches the in-app emblem and the
       VOIDNS brand (cyan #00c8ff on near-black), so the tray/taskbar/app icon all
       read as one product. -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="72%">
      <stop offset="0%" stop-color="#101028"/>
      <stop offset="52%" stop-color="#08081a"/>
      <stop offset="100%" stop-color="#030309"/>
    </radialGradient>
    <radialGradient id="rim" cx="50%" cy="50%" r="50%">
      <stop offset="66%" stop-color="#00c8ff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#00c8ff" stop-opacity="0.45"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#aef0ff"/>
      <stop offset="35%" stop-color="#00c8ff"/>
      <stop offset="100%" stop-color="#00c8ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- rounded-square backdrop -->
  <rect x="40" y="40" width="944" height="944" rx="208" fill="url(#bg)"/>
  <rect x="40" y="40" width="944" height="944" rx="208" fill="none" stroke="#00c8ff" stroke-width="3" opacity="0.22"/>

  <!-- emblem, centred and scaled from the 200x200 in-app artwork (×3.4, centred) -->
  <g transform="translate(512,512) scale(3.4) translate(-100,-100)">
    <circle cx="100" cy="100" r="82" fill="url(#rim)"/>
    <circle cx="100" cy="100" r="82" fill="none" stroke="#00c8ff" stroke-width="1.1" opacity="0.55"/>

    <g filter="url(#glow)" opacity="0.85">
      <circle cx="100" cy="100" r="66" fill="none" stroke="#00c8ff" stroke-width="0.9" stroke-dasharray="2 8" opacity="0.5"/>
      <circle cx="100" cy="100" r="58" fill="none" stroke="#00c8ff" stroke-width="1.1" stroke-dasharray="46 26" opacity="0.65"/>
      <circle cx="100" cy="100" r="42" fill="none" stroke="#00c8ff" stroke-width="1.2" stroke-dasharray="30 18" opacity="0.7"/>
      <circle cx="100" cy="100" r="28" fill="none" stroke="#00c8ff" stroke-width="1.4" opacity="0.8"/>
    </g>

    <g filter="url(#glow)" opacity="0.7">
      <g stroke="#00c8ff" stroke-width="0.9" opacity="0.55">
        <line x1="100" y1="100" x2="100" y2="42"/>
        <line x1="100" y1="100" x2="150.2" y2="129"/>
        <line x1="100" y1="100" x2="49.8" y2="129"/>
      </g>
      <g fill="#00c8ff">
        <circle cx="100" cy="42" r="3"/>
        <circle cx="150.2" cy="129" r="3"/>
        <circle cx="49.8" cy="129" r="3"/>
      </g>
    </g>

    <circle cx="100" cy="100" r="22" fill="url(#coreGlow)" opacity="0.9"/>
    <circle cx="100" cy="100" r="8" fill="#00c8ff"/>
    <circle cx="100" cy="100" r="3.4" fill="#ffffff"/>
  </g>
</svg>
