name: tier2

# Tier 2 — the heavy, less-hermetic suites kept out of the fast tier1 (ci.yml):
#
#   * mock-doh   : the local mock-DoH cargo test (needs the node mock), 3 OS.
#   * e2e-*      : the real thing — run the actual installer (NO GUI) on each OS,
#                  which fully installs + starts the privileged service, then use
#                  the shipped `voidns` CLI (the terminal twin of the GUI) to
#                  connect to a local mock DoH, resolve a name through the SYSTEM
#                  resolver, and assert the query reached the mock:
#                     a. install app (real installer script)
#                     b. `voidns connect …`           (CLI → service over IPC)
#                     c. system DNS resolve command    (dig / dscacheutil / Resolve-DnsName)
#                     d. mock server catches the query
#   * installers : build the Tauri bundles (+ sidecar service/CLI) per OS.
#   * publish    : push the installers to VPS1 on main.

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: tier2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The hermetic local mock-DoH cargo test (moved here from tier1): install the
  # node mock deps so doh_local actually runs (instead of skipping) on all 3 OS.
  mock-doh:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install local DoH mock deps
        working-directory: crates/voidns-core/tests/doh-mock
        run: npm ci || npm install
      - name: test (mock-DoH now runs, not skipped)
        run: cargo test --workspace --locked

  # Real system e2e (Linux): run installers/linux/install-dev.sh (the actual
  # installer — builds + installs the service AND the `voidns` CLI, enables the
  # systemd unit), connect to a local mock via the CLI, resolve through the
  # system resolver, and confirm the query reached the mock.
  e2e-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Tools + mock deps
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y dnsutils
          (cd crates/voidns-core/tests/doh-mock && (npm ci || npm install))

      - name: Generate + trust mock CA
        run: |
          set -euo pipefail
          mkdir -p e2e-certs && cd e2e-certs
          openssl req -x509 -newkey rsa:2048 -nodes -keyout ca.key -out ca.crt \
            -days 2 -subj "/CN=voidns-e2e-ca"
          openssl req -newkey rsa:2048 -nodes -keyout leaf.key -out leaf.csr -subj "/CN=localhost"
          openssl x509 -req -in leaf.csr -CA ca.crt -CAkey ca.key -CAcreateserial \
            -out leaf.crt -days 2 -extfile <(printf "subjectAltName=DNS:localhost,IP:127.0.0.1")
          sudo cp ca.crt /usr/local/share/ca-certificates/voidns-e2e.crt
          sudo update-ca-certificates

      - name: Start mock DoH server
        run: |
          set -euo pipefail
          cd crates/voidns-core/tests/doh-mock
          node mock-doh.mjs "$GITHUB_WORKSPACE/e2e-certs/leaf.crt" \
            "$GITHUB_WORKSPACE/e2e-certs/leaf.key" 0 > "$GITHUB_WORKSPACE/mock.log" 2>&1 &
          echo $! > "$GITHUB_WORKSPACE/mock.pid"
          for _ in $(seq 1 50); do
            PORT=$(sed -n 's/^PORT=//p' "$GITHUB_WORKSPACE/mock.log" | head -1)
            [ -n "$PORT" ] && break || sleep 0.2
          done
          [ -n "${PORT:-}" ] || { echo "mock did not report PORT"; cat "$GITHUB_WORKSPACE/mock.log"; exit 1; }
          echo "MOCK_PORT=$PORT" >> "$GITHUB_ENV"

      - name: a. Install app (real installer — no GUI)
        run: |
          set -euo pipefail
          installers/linux/install-dev.sh
          # Wait until the CLI can reach the freshly-installed service.
          for _ in $(seq 1 50); do voidns status >/dev/null 2>&1 && break || sleep 0.2; done
          voidns status

      - name: b–d. CLI connect + system resolve + mock catches
        run: |
          set -euo pipefail
          # b. connect to the mock through the SAME IPC path the GUI uses
          voidns connect custom 127.0.0.1 localhost /dns-query "$MOCK_PORT"
          sudo resolvectl flush-caches 2>/dev/null || sudo systemd-resolve --flush-caches 2>/dev/null || true
          # c. resolve through the system resolver
          : > /tmp/resolve.out
          resolvectl query example.com 2>&1 | tee -a /tmp/resolve.out || true
          dig +short +tries=2 +time=3 example.com A 2>&1 | tee -a /tmp/resolve.out || true
          echo "---- resolve.out ----"; cat /tmp/resolve.out
          echo "---- mock.log ----"; cat "$GITHUB_WORKSPACE/mock.log"
          # d. the query must have reached the mock through the redirect
          grep -q "^QUERY=example.com" "$GITHUB_WORKSPACE/mock.log" \
            || { echo "FAIL: mock never received the query"; exit 1; }
          grep -q "127.0.0.1" /tmp/resolve.out \
            || { echo "FAIL: resolver did not return 127.0.0.1"; exit 1; }
          echo "OK: install → CLI connect → system resolve → mock caught the query"

      - name: Teardown
        if: always()
        run: |
          voidns disconnect || true
          installers/linux/uninstall-dev.sh || true
          [ -f "$GITHUB_WORKSPACE/mock.pid" ] && kill "$(cat "$GITHUB_WORKSPACE/mock.pid")" 2>/dev/null || true

  # Real system e2e (macOS): run the real .pkg postinstall.sh (installs the
  # LaunchDaemon + the `voidns` CLI), connect via the CLI, resolve through the
  # system resolver (dscacheutil → mDNSResponder), confirm the mock got it.
  e2e-macos:
    runs-on: macos-latest
    env:
      VOIDNS_SOCK: /var/run/net.voidns.proxy.sock
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Mock deps
        run: cd crates/voidns-core/tests/doh-mock && (npm ci || npm install)

      - name: Build service + CLI (release)
        run: cargo build --release --locked -p voidns-service -p voidns-cli

      - name: Generate + trust mock CA
        run: |
          set -euo pipefail
          mkdir -p e2e-certs && cd e2e-certs
          openssl req -x509 -newkey rsa:2048 -nodes -keyout ca.key -out ca.crt \
            -days 2 -subj "/CN=voidns-e2e-ca"
          openssl req -newkey rsa:2048 -nodes -keyout leaf.key -out leaf.csr -subj "/CN=localhost"
          openssl x509 -req -in leaf.csr -CA ca.crt -CAkey ca.key -CAcreateserial \
            -out leaf.crt -days 2 -extfile <(printf "subjectAltName=DNS:localhost,IP:127.0.0.1")
          sudo security add-trusted-cert -d -r trustRoot \
            -k /Library/Keychains/System.keychain ca.crt

      - name: Start mock DoH server
        run: |
          set -euo pipefail
          cd crates/voidns-core/tests/doh-mock
          node mock-doh.mjs "$GITHUB_WORKSPACE/e2e-certs/leaf.crt" \
            "$GITHUB_WORKSPACE/e2e-certs/leaf.key" 0 > "$GITHUB_WORKSPACE/mock.log" 2>&1 &
          echo $! > "$GITHUB_WORKSPACE/mock.pid"
          for _ in $(seq 1 50); do
            PORT=$(sed -n 's/^PORT=//p' "$GITHUB_WORKSPACE/mock.log" | head -1)
            [ -n "$PORT" ] && break || sleep 0.2
          done
          [ -n "${PORT:-}" ] || { echo "mock did not report PORT"; cat "$GITHUB_WORKSPACE/mock.log"; exit 1; }
          echo "MOCK_PORT=$PORT" >> "$GITHUB_ENV"

      - name: a. Install app (real .pkg postinstall — no GUI)
        run: |
          set -euo pipefail
          stage=pkg-stage
          mkdir -p "$stage"
          cp target/release/voidns-service target/release/voidns "$stage/"
          cp installers/macos/net.voidns.proxy.plist installers/macos/postinstall.sh "$stage/"
          (cd "$stage" && sudo sh ./postinstall.sh)
          for _ in $(seq 1 50); do voidns status >/dev/null 2>&1 && break || sleep 0.2; done
          voidns status

      - name: b–d. CLI connect + system resolve + mock catches
        run: |
          set -euo pipefail
          voidns connect custom 127.0.0.1 localhost /dns-query "$MOCK_PORT"
          sudo dscacheutil -flushcache || true
          sudo killall -HUP mDNSResponder || true
          ANS=$(dscacheutil -q host -a name example.com | awk '/^ip_address:/ {print $2; exit}')
          echo "dscacheutil example.com => '$ANS'"
          echo "---- mock.log ----"; cat "$GITHUB_WORKSPACE/mock.log"
          grep -q "^QUERY=example.com" "$GITHUB_WORKSPACE/mock.log" \
            || { echo "FAIL: mock never received the query"; exit 1; }
          [ "$ANS" = "127.0.0.1" ] || { echo "FAIL: unexpected answer '$ANS'"; exit 1; }
          echo "OK: install → CLI connect → system resolve → mock caught the query"

      - name: Teardown
        if: always()
        run: |
          voidns disconnect || true
          sudo launchctl bootout system /Library/LaunchDaemons/net.voidns.proxy.plist || true
          [ -f "$GITHUB_WORKSPACE/mock.pid" ] && kill "$(cat "$GITHUB_WORKSPACE/mock.pid")" 2>/dev/null || true

  # Real system e2e (Windows): run the real headless installer
  # (installers/windows/install-service.ps1 — the same logic the NSIS bundle hook
  # runs), connect via the CLI, resolve through the system resolver, confirm the
  # mock got it.
  e2e-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Mock deps
        shell: bash
        run: cd crates/voidns-core/tests/doh-mock && (npm ci || npm install)

      - name: Build service + CLI (release)
        run: cargo build --release --locked -p voidns-service -p voidns-cli

      - name: Generate mock CA
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p e2e-certs && cd e2e-certs
          # Native Windows OpenSSL can't read bash process-substitution paths
          # (/proc/<pid>/fd/..), so write the SAN extfile to a real file.
          printf "subjectAltName=DNS:localhost,IP:127.0.0.1\n" > san.cnf
          openssl req -x509 -newkey rsa:2048 -nodes -keyout ca.key -out ca.crt \
            -days 2 -subj "//CN=voidns-e2e-ca"
          openssl req -newkey rsa:2048 -nodes -keyout leaf.key -out leaf.csr -subj "//CN=localhost"
          openssl x509 -req -in leaf.csr -CA ca.crt -CAkey ca.key -CAcreateserial \
            -out leaf.crt -days 2 -extfile san.cnf

      - name: Trust mock CA (LocalMachine Root store)
        shell: pwsh
        run: |
          # The daemon runs as the LocalSystem service, which validates upstream
          # DoH certs against the LocalMachine root store (via
          # rustls-platform-verifier). certutil's default store can land in the
          # current user's store, which SYSTEM does not read — so import
          # explicitly into Cert:\LocalMachine\Root.
          Import-Certificate -FilePath "$env:GITHUB_WORKSPACE\e2e-certs\ca.crt" `
            -CertStoreLocation Cert:\LocalMachine\Root | Out-Null
          Write-Host "Imported mock CA into LocalMachine\Root"

      - name: Start mock DoH server
        shell: pwsh
        run: |
          $cert = "$env:GITHUB_WORKSPACE\e2e-certs\leaf.crt"
          $key  = "$env:GITHUB_WORKSPACE\e2e-certs\leaf.key"
          $log  = "$env:GITHUB_WORKSPACE\mock.log"
          $p = Start-Process node -PassThru -WindowStyle Hidden `
            -WorkingDirectory "crates\voidns-core\tests\doh-mock" `
            -ArgumentList "mock-doh.mjs","$cert","$key","0" `
            -RedirectStandardOutput $log -RedirectStandardError "$env:GITHUB_WORKSPACE\mock.err"
          $p.Id | Out-File "$env:GITHUB_WORKSPACE\mock.pid"
          $port = $null
          foreach ($i in 1..50) {
            if (Test-Path $log) {
              $m = Select-String -Path $log -Pattern '^PORT=(\d+)' | Select-Object -First 1
              if ($m) { $port = $m.Matches[0].Groups[1].Value; break }
            }
            Start-Sleep -Milliseconds 200
          }
          if (-not $port) { Get-Content $log,"$env:GITHUB_WORKSPACE\mock.err" -EA SilentlyContinue; throw "mock did not report PORT" }
          "MOCK_PORT=$port" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: a. Install app (real headless installer — no GUI)
        shell: pwsh
        run: |
          $src = "$env:GITHUB_WORKSPACE\target\release"
          & "$env:GITHUB_WORKSPACE\installers\windows\install-service.ps1" -Action install -SourceDir $src
          $cli = "$env:ProgramFiles\VoidNS\voidns.exe"
          foreach ($i in 1..50) { & $cli status *> $null; if ($LASTEXITCODE -eq 0) { break }; Start-Sleep -Milliseconds 200 }
          "VOIDNS_CLI=$cli" | Out-File -FilePath $env:GITHUB_ENV -Append
          & $cli status

      - name: b–d. CLI connect + system resolve + mock catches
        shell: pwsh
        run: |
          & $env:VOIDNS_CLI connect custom 127.0.0.1 localhost /dns-query $env:MOCK_PORT
          if ($LASTEXITCODE -ne 0) { throw "connect failed" }
          ipconfig /flushdns | Out-Null

          # Diagnostics: confirm the redirect actually pointed the adapters at the
          # proxy, and prove the proxy->mock path independently of the redirect.
          Write-Host "---- DNS servers per interface ----"
          Get-DnsClientServerAddress -AddressFamily IPv4 |
            Where-Object { $_.ServerAddresses } |
            Format-Table -AutoSize InterfaceAlias, ServerAddresses | Out-String | Write-Host
          $direct = (Resolve-DnsName -Server 127.0.0.1 -Name example.com -Type A -DnsOnly -ErrorAction SilentlyContinue |
                     Where-Object { $_.Type -eq 'A' } | Select-Object -First 1).IPAddress
          Write-Host "Direct proxy query (127.0.0.1) example.com => '$direct'"

          # The real assertion: system resolver (no -Server) must flow through the
          # redirect to the proxy and reach the mock.
          $ans = (Resolve-DnsName -Name example.com -Type A -DnsOnly -ErrorAction SilentlyContinue |
                  Where-Object { $_.Type -eq 'A' } | Select-Object -First 1).IPAddress
          Write-Host "System resolve example.com => '$ans'"
          Write-Host "---- mock.log ----"; Get-Content "$env:GITHUB_WORKSPACE\mock.log" -EA SilentlyContinue
          Write-Host "---- mock.err ----"; Get-Content "$env:GITHUB_WORKSPACE\mock.err" -EA SilentlyContinue
          Write-Host "---- service.log ----"; Get-Content "$env:ProgramData\VoidNS\service.log" -EA SilentlyContinue

          if (-not (Select-String -Path "$env:GITHUB_WORKSPACE\mock.log" -Pattern '^QUERY=example.com' -Quiet)) {
            throw "FAIL: mock never received the query"
          }
          if ($ans -ne '127.0.0.1') { throw "FAIL: unexpected answer '$ans'" }
          Write-Host "OK: install -> CLI connect -> system resolve -> mock caught the query"

      - name: Teardown
        if: always()
        shell: pwsh
        run: |
          & $env:VOIDNS_CLI disconnect 2>$null
          & "$env:GITHUB_WORKSPACE\installers\windows\install-service.ps1" -Action uninstall 2>$null
          if (Test-Path "$env:GITHUB_WORKSPACE\mock.pid") {
            Stop-Process -Id (Get-Content "$env:GITHUB_WORKSPACE\mock.pid") -Force -EA SilentlyContinue
          }

  # Installers / artifacts: build the Tauri bundle (which now also ships the
  # privileged service + the `voidns` CLI as sidecars) per OS and upload them.
  installers:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Linux GUI build deps (WebKitGTK)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev file

      - name: Build GUI installer (Tauri bundle — stages service + CLI sidecars)
        working-directory: crates/gui
        shell: bash
        run: |
          npm ci || npm install
          case "${{ matrix.os }}" in
            ubuntu-latest)  npx tauri build --bundles deb,appimage ;;
            windows-latest) npx tauri build --bundles msi,nsis ;;
            macos-latest)   npx tauri build --bundles app,dmg ;;
          esac

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist
          find crates/gui/src-tauri/target/release/bundle -type f \
            \( -name '*.deb' -o -name '*.AppImage' -o -name '*.rpm' \
               -o -name '*.msi' -o -name '*.exe' -o -name '*.dmg' \) \
            -exec cp -r {} dist/ \; 2>/dev/null || true
          cp target/release/voidns-service* dist/ 2>/dev/null || true
          cp target/release/voidns dist/ 2>/dev/null || true
          cp target/release/voidns.exe dist/ 2>/dev/null || true
          cp -r installers dist/installers 2>/dev/null || true
          ls -la dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: voidns-${{ matrix.os }}
          path: dist/**
          if-no-files-found: warn

  # Publish the per-OS installers to VPS1, where nginx serves them at
  # voidns.net/downloads (the frontend + bot link there instead of GitHub releases).
  publish:
    needs: installers
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts            # → artifacts/voidns-<os>/...

      - name: Rename installers to the stable names the web client expects
        shell: bash
        run: |
          mkdir -p publish
          find artifacts -name '*.msi'      -exec cp {} publish/VoidNS-Client-x64.msi \;
          find artifacts -name '*.dmg'      -exec cp {} publish/VoidNS-Client.dmg \;
          find artifacts -name '*.deb'      -exec cp {} publish/VoidNS-Client-amd64.deb \;
          find artifacts -name '*.AppImage' -exec cp {} publish/VoidNS-Client-x86_64.AppImage \;
          ls -la publish

      - name: Push installers to VPS1 (nginx /downloads)
        env:
          SSH_KEY: ${{ secrets.VPS1_SSH_KEY }}
          VPS1_HOST: ${{ secrets.VPS1_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          SSH_OPTS="-o StrictHostKeyChecking=accept-new -i $HOME/.ssh/id_ed25519"
          ssh $SSH_OPTS "$VPS1_HOST" 'mkdir -p /opt/voidns/infra/downloads'
          scp $SSH_OPTS publish/* "$VPS1_HOST:/opt/voidns/infra/downloads/"
