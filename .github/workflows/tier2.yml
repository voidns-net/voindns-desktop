name: tier2

# Tier 2 — the heavy, less-hermetic suite kept out of the fast tier1 (ci.yml):
#
#   * mock-doh : the local mock-DoH cargo test (needs the node mock), 3 OS.

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: tier2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The hermetic local mock-DoH cargo test (moved here from tier1): install the
  # node mock deps so doh_local actually runs (instead of skipping) on all 3 OS.
  mock-doh:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install local DoH mock deps
        working-directory: crates/voidns-core/tests/doh-mock
        run: npm ci || npm install
      - name: test (mock-DoH now runs, not skipped)
        run: cargo test --workspace --locked
