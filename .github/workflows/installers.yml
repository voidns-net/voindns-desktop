name: installers

# Build the Tauri installers that ship + register the privileged service.
# Scope (per task): Windows (NSIS) and Linux (RPM) only.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    paths:
      - "crates/**"
      - "e2e/**"
      - "ci/**"
      - ".github/workflows/installers.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Linux RPM — runs on the self-hosted VPS1 runner (no GitHub-hosted runners are
  # available for this org). checkout runs natively on the runner; the Fedora
  # build runs in an explicit `docker run` (a job `container:` can't run JS
  # actions on a docker-socket runner). The workspace is bind-mounted at the same
  # path, so the built .rpm appears back in $GITHUB_WORKSPACE for upload.
  linux-rpm:
    runs-on: [self-hosted, linux, vps1]
    steps:
      - uses: actions/checkout@v4
      - name: Build RPM in Fedora container
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE":"$GITHUB_WORKSPACE" -w "$GITHUB_WORKSPACE" \
            fedora:40 bash ci/fedora-build-rpm.sh

      - uses: actions/upload-artifact@v4
        with:
          name: voidns-linux-rpm
          path: crates/gui/src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: error

  # Windows NSIS — config is committed and ready, but there is no Windows runner
  # yet. Set repo variable HAS_WINDOWS_RUNNER=true (and a matching self-hosted
  # windows runner) to enable; otherwise this job is skipped, not queued.
  windows-nsis:
    if: ${{ vars.HAS_WINDOWS_RUNNER == 'true' }}
    runs-on: [self-hosted, windows]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build service + CLI (release)
        run: cargo build --release -p voidns-service -p voidns-cli
      - name: Stage sidecars for Tauri
        run: node crates/gui/scripts/stage-sidecars.mjs
      - name: Build NSIS installer
        working-directory: crates/gui
        run: |
          npm ci
          npm run tauri -- build --bundles nsis

      - uses: actions/upload-artifact@v4
        with:
          name: voidns-windows-nsis
          path: crates/gui/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
