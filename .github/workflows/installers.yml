name: installers

# Build the Tauri installers that ship + register the privileged service.
# Scope (per task): Windows (NSIS) and Linux (RPM) only.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    paths:
      - "crates/**"
      - "e2e/**"
      - ".github/workflows/installers.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bundle: nsis
            artifact: voidns-windows-nsis
            glob: crates/gui/src-tauri/target/release/bundle/nsis/*.exe
          - os: ubuntu-latest
            bundle: rpm
            artifact: voidns-linux-rpm
            glob: crates/gui/src-tauri/target/release/bundle/rpm/*.rpm
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps (Tauri + rpmbuild)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev build-essential file rpm

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build service + CLI (release)
        run: cargo build --release -p voidns-service -p voidns-cli

      - name: Stage sidecars for Tauri
        run: node crates/gui/scripts/stage-sidecars.mjs

      - name: Install GUI deps
        working-directory: crates/gui
        run: npm ci

      - name: Build installer (${{ matrix.bundle }})
        working-directory: crates/gui
        run: npm run tauri -- build --bundles ${{ matrix.bundle }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.glob }}
          if-no-files-found: error
