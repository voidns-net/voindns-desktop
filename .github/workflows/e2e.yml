name: e2e

# Installer end-to-end test (Windows NSIS + Linux RPM):
#   1. build the installer
#   2. install it headless ("--noconfirm")
#   3. wait for the service the installer registered
#   4. voidns connect custom 127.0.0.1 mock.voidns.test /dns-query <port>
#   5. fire a DNS query at the proxy
#   6. assert it reached the TypeScript mock DoH server
# The harness lives in e2e/ (see e2e/src/run.ts).

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "crates/**"
      - "e2e/**"
      - "ci/**"
      - ".github/workflows/e2e.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Linux RPM e2e on the self-hosted VPS1 runner. checkout runs natively; the
  # build + real rpm install + DNS-through-proxy assertion run in an explicit
  # `docker run fedora` (workspace bind-mounted at the same path).
  linux-rpm:
    runs-on: [self-hosted, linux, vps1]
    steps:
      - uses: actions/checkout@v4
      - name: Build RPM + run installer e2e in Fedora container
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE":"$GITHUB_WORKSPACE" -w "$GITHUB_WORKSPACE" \
            fedora:40 bash ci/fedora-e2e.sh

  # Windows NSIS e2e — gated until a self-hosted Windows runner exists
  # (set repo variable HAS_WINDOWS_RUNNER=true). Skipped, not queued, otherwise.
  windows:
    if: ${{ vars.HAS_WINDOWS_RUNNER == 'true' }}
    runs-on: [self-hosted, windows]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build service + CLI
        run: cargo build --release -p voidns-service -p voidns-cli
      - name: Stage sidecars
        run: node crates/gui/scripts/stage-sidecars.mjs
      - name: Build NSIS installer
        working-directory: crates/gui
        run: |
          npm ci
          npm run tauri -- build --bundles nsis

      - name: Run installer e2e
        working-directory: e2e
        env:
          BUNDLE_DIR: ${{ github.workspace }}/crates/gui/src-tauri/target/release/bundle/nsis
        run: |
          npm ci
          npm run e2e:install
