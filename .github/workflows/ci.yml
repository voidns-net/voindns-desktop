name: ci

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Linux: full engine build + lint + integration tests (DoH egress + unix
  # socket) on the self-hosted runner.
  linux:
    # Prefers the self-hosted vps1 runner, but it belongs to an org runner
    # group not (yet) granted to this repo. Until an org admin adds this repo to
    # the group, run on the hosted ubuntu runner. To switch back, replace the
    # line below with: runs-on: [self-hosted, linux, vps1]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: build
        run: cargo build --workspace --locked
      - name: test
        run: cargo test --workspace --locked

  # Windows & macOS: native build + per-platform tests. This is where
  # redirect/windows.rs and redirect/macos.rs are compiled and the parser unit
  # tests run on their real OS.
  cross:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: build
        run: cargo build --workspace --locked
      - name: test
        run: cargo test --workspace --locked

  # GUI frontend (Svelte) builds on every push.
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci || npm install
      - run: npm run build
