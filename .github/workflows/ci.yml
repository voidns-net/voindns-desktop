name: ci

# Tier 1 — the simplest, fastest, fully hermetic checks: lint + build + the
# unit/IPC tests that need no network and no external mock. The heavier mock-DoH
# suite lives in tier2.yml. The mock-DoH-dependent cargo tests (doh_local,
# proxy_doh) still *compile* here but skip at runtime because the node mock deps
# are not installed — so tier1 stays green and quick.

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lint + build + hermetic tests on Linux.
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: build
        run: cargo build --workspace --locked
      - name: test (hermetic — mock-DoH tests skip without node deps)
        run: cargo test --workspace --locked

  # Native build + hermetic tests on Windows & macOS (redirect/windows.rs and
  # redirect/macos.rs compile + per-OS unit tests run).
  cross:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: build
        run: cargo build --workspace --locked
      - name: test
        run: cargo test --workspace --locked

  # GUI frontend (Svelte): build on every push.
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/gui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci || npm install
      - run: npm run build
